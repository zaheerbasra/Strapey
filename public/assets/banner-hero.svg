<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2919;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a4d2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2c2c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Damascus Pattern -->
    <pattern id="damascus" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0,20 Q 10,10 20,20 T 40,20" stroke="#808080" stroke-width="0.5" fill="none" opacity="0.15"/>
      <path d="M 0,25 Q 10,35 20,25 T 40,25" stroke="#6b7280" stroke-width="0.5" fill="none" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#heroGradient)"/>
  <rect width="1200" height="400" fill="url(#damascus)"/>
  
  <!-- Mountain Silhouette -->
  <path d="M 0,300 L 150,180 L 300,250 L 450,150 L 600,220 L 750,170 L 900,240 L 1050,200 L 1200,280 L 1200,400 L 0,400 Z" 
        fill="#0f2919" opacity="0.6"/>
  <path d="M 0,320 L 200,220 L 400,280 L 600,200 L 800,260 L 1000,230 L 1200,300 L 1200,400 L 0,400 Z" 
        fill="#1a4d2e" opacity="0.4"/>
  
  <!-- Large Knife Illustration -->
  <g transform="translate(250, 120)">
    <!-- Blade -->
    <path d="M 0,0 L 350,70 L 350,95 L 0,25 Z" 
          fill="#6b7280" 
          stroke="#ffffff" 
          stroke-width="2" 
          opacity="0.9"/>
    <path d="M 0,0 L 350,70 L 340,73 L 0,5 Z" 
          fill="#808080" 
          opacity="0.5"/>
    
    <!-- Blade Edge Highlight -->
    <line x1="0" y1="2" x2="340" y2="72" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          opacity="0.3"/>
    
    <!-- Handle -->
    <rect x="-60" y="-10" width="70" height="50" 
          fill="#92400e" 
          stroke="#d97706" 
          stroke-width="3"/>
    <rect x="-55" y="0" width="60" height="8" 
          fill="#d97706" 
          opacity="0.7"/>
    <rect x="-55" y="22" width="60" height="8" 
          fill="#d97706" 
          opacity="0.7"/>
    
    <!-- Handle Rivets -->
    <circle cx="-35" cy="15" r="4" fill="#b45309" stroke="#2c2c2c" stroke-width="1"/>
    <circle cx="-20" cy="15" r="4" fill="#b45309" stroke="#2c2c2c" stroke-width="1"/>
  </g>
  
  <!-- Brand Name -->
  <text x="600" y="280" 
        font-family="'Bebas Neue', 'Impact', sans-serif" 
        font-size="96" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="12"
        opacity="0.95">STRAPEY</text>
  
  <!-- Motto -->
  <text x="600" y="330" 
        font-family="'Open Sans', sans-serif" 
        font-size="28" 
        fill="#d97706" 
        text-anchor="middle"
        letter-spacing="6"
        font-weight="300">CRAFTED FOR WILD</text>
  
  <!-- Decorative Lines -->
  <line x1="350" y1="345" x2="480" y2="345" stroke="#92400e" stroke-width="3" opacity="0.7"/>
  <line x1="720" y1="345" x2="850" y2="345" stroke="#92400e" stroke-width="3" opacity="0.7"/>
  
  <!-- Accent Circles -->
  <circle cx="330" cy="345" r="5" fill="#d97706" opacity="0.8"/>
  <circle cx="870" cy="345" r="5" fill="#d97706" opacity="0.8"/>
  
  <!-- Tagline -->
  <text x="600" y="375" 
        font-family="'Open Sans', sans-serif" 
        font-size="16" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="3"
        opacity="0.7">PREMIUM HUNTING & KITCHEN KNIVES</text>
  <!-- Background - Black with subtle gradient -->
  <defs>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="damascus" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M0,20 Q10,10 20,20 T40,20" stroke="#303030" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M0,25 Q10,35 20,25 T40,25" stroke="#303030" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M0,30 Q10,20 20,30 T40,30" stroke="#303030" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#darkGradient)"/>
  <rect width="1200" height="400" fill="url(#damascus)"/>
  
  <!-- Subtle Mountain Silhouette -->
  <polygon points="0,400 150,280 300,320 450,240 600,300 750,220 900,280 1050,250 1200,320 1200,400" fill="#0a0a0a" opacity="0.5"/>
  <polygon points="0,400 100,340 250,360 400,310 550,350 700,290 850,320 1000,300 1200,360 1200,400" fill="#0a0a0a" opacity="0.3"/>
  
  <!-- Large Knife/Blade Icon -->
  <g transform="translate(100, 120)">
    <polygon points="0,0 40,−20 80,0 80,100 40,140 0,100" fill="#1a1a1a" stroke="#808080" stroke-width="3" opacity="0.9"/>
    <line x1="40" y1="−15" x2="40" y2="130" stroke="#c0c0c0" stroke-width="3.5"/>
    <line x1="10" y1="20" x2="70" y2="20" stroke="#808080" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="50" x2="70" y2="50" stroke="#808080" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="80" x2="70" y2="80" stroke="#808080" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Brand Name -->
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#ffffff" letter-spacing="12">STRAPEY</text>
  
  <!-- Tagline -->
  <text x="250" y="270" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="#c0c0c0" letter-spacing="8" style="text-transform: uppercase;">Crafted for the Wild</text>
  
  <!-- Decorative Line -->
  <line x1="250" y1="290" x2="900" y2="290" stroke="#808080" stroke-width="2"/>
  
  <!-- Subtext -->
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="300" fill="#e0e0e0" letter-spacing="2">Premium Hand-Forged Damascus Steel • Hunting • Kitchen • Outdoor</text>
</svg>
