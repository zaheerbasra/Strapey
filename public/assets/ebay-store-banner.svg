<svg width="1200" height="270" viewBox="0 0 1200 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ebayGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4d2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4d2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="270" fill="url(#ebayGradient)"/>
  
  <!-- Mountain Silhouette -->
  <path d="M 0,200 L 150,120 L 300,170 L 450,100 L 600,150 L 750,110 L 900,160 L 1050,130 L 1200,180 L 1200,270 L 0,270 Z" 
        fill="#0f2919" opacity="0.5"/>
  
  <!-- Knife Illustration -->\n  <g transform="translate(150, 80)">
    <path d="M 0,0 L 200,30 L 200,42 L 0,12 Z" fill="#6b7280" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <path d="M 0,0 L 200,30 L 195,32 L 0,3 Z" fill="#808080" opacity="0.6"/>
    <rect x="-35" y="-6" width="40" height="26" fill="#92400e" stroke="#d97706" stroke-width="2"/>
    <rect x="-32" y="2" width="34" height="4" fill="#d97706" opacity="0.7"/>
    <rect x="-32" y="12" width="34" height="4" fill="#d97706" opacity="0.7"/>
    <circle cx="-18" cy="8" r="2.5" fill="#b45309"/>
  </g>
  
  <!-- Brand Name -->
  <text x="600" y="140" 
        font-family="'Bebas Neue', 'Impact', sans-serif" 
        font-size="72" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="10">STRAPEY</text>
  
  <!-- Motto -->
  <text x="600" y="180" 
        font-family="'Open Sans', sans-serif" 
        font-size="22" 
        fill="#d97706" 
        text-anchor="middle"
        letter-spacing="5">CRAFTED FOR WILD</text>
  
  <!-- Category Tags -->
  <g transform="translate(330, 210)">
    <rect width="540" height="35" fill="rgba(0,0,0,0.3)" rx="17"/>
    <text x="270" y="24" 
          font-family="'Open Sans', sans-serif" 
          font-size="14" 
          fill="#ffffff" 
          text-anchor="middle"
          letter-spacing="2">HUNTING KNIVES • CHEF KNIVES • CUSTOM GRIPS</text>
  </g>
  
  <!-- Decorative Lines -->
  <line x1="450" y1="195" x2="530" y2="195" stroke="#92400e" stroke-width="2"/>
  <line x1="670" y1="195" x2="750" y2="195" stroke="#92400e" stroke-width="2"/>
</svg>
