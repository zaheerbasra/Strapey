<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Forest Green Background -->
  <rect width="300" height="120" fill="#1a4d2e" rx="8"/>
  
  <!-- Knife Blade Icon -->
  <g transform="translate(150, 25)">
    <!-- Blade -->
    <path d="M -30,0 L 30,15 L 30,20 L -30,5 Z" fill="#6b7280" stroke="#2c2c2c" stroke-width="1"/>
    <path d="M -30,0 L 30,15 L 25,16 L -30,2 Z" fill="#808080" opacity="0.7"/>
    
    <!-- Handle -->
    <rect x="-40" y="-3" width="15" height="10" fill="#92400e" stroke="#2c2c2c" stroke-width="1"/>
    <line x1="-40" y1="0" x2="-25" y2="0" stroke="#d97706" stroke-width="1"/>
    <line x1="-40" y1="4" x2="-25" y2="4" stroke="#d97706" stroke-width="1"/>
  </g>
  
  <!-- Mountain Silhouette -->
  <path d="M 20,45 L 50,25 L 80,45 L 220,45 L 250,25 L 280,45" 
        fill="none" stroke="#92400e" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Brand Name -->
  <text x="150" y="75" 
        font-family="'Bebas Neue', 'Impact', sans-serif" 
        font-size="42" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="4">STRAPEY</text>
  
  <!-- Motto -->
  <text x="150" y="95" 
        font-family="'Open Sans', sans-serif" 
        font-size="11" 
        fill="#d97706" 
        text-anchor="middle"
        letter-spacing="2">CRAFTED FOR WILD</text>
  
  <!-- Decorative Lines -->
  <line x1="60" y1="98" x2="100" y2="98" stroke="#92400e" stroke-width="1.5"/>
  <line x1="200" y1="98" x2="240" y2="98" stroke="#92400e" stroke-width="1.5"/>
</svg>
