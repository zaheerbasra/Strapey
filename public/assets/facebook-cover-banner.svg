<svg width="1200" height="628" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a4d2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2c2c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="628" fill="url(#fbGradient)"/>
  
  <!-- Left Section - Knife Illustration -->
  <g transform="translate(150, 200)">
    <path d="M 0,0 L 350,70 L 350,95 L 0,25 Z" 
          fill="#6b7280" 
          stroke="#ffffff" 
          stroke-width="3" 
          opacity="0.95"/>
    <path d="M 0,0 L 350,70 L 340,73 L 0,5 Z" 
          fill="#808080" 
          opacity="0.6"/>
    <rect x="-55" y="-10" width="60" height="45" 
          fill="#92400e" 
          stroke="#d97706" 
          stroke-width="3"/>
    <rect x="-50" y="2" width="50" height="7" 
          fill="#d97706" 
          opacity="0.7"/>
    <rect x="-50" y="20" width="50" height="7" 
          fill="#d97706" 
          opacity="0.7"/>
    <circle cx="-28" cy="13" r="3.5" fill="#b45309" stroke="#2c2c2c" stroke-width="1"/>
  </g>
  
  <!-- Right Section - Brand -->
  <g transform="translate(700, 0)">
    <!-- Logo Circle -->
    <circle cx="150" cy="150" r="80" fill="#2c2c2c" stroke="#d97706" stroke-width="4"/>
    <g transform="translate(150, 150)">
      <path d="M -40,-7 L 45,8 L 45,15 L -40,0 Z" fill="#6b7280" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="-55" y="-6" width="18\" height=\"16\" fill=\"#92400e\" stroke=\"#ffffff\" stroke-width=\"1\"/>
    </g>
    
    <!-- Brand Name -->
    <text x=\"150\" y=\"280\" 
          font-family=\"'Bebas Neue', 'Impact', sans-serif\" 
          font-size=\"72\" 
          font-weight=\"900\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          letter-spacing=\"8\">STRAPEY</text>
    
    <!-- Motto -->
    <text x=\"150\" y=\"330\" 
          font-family=\"'Open Sans', sans-serif\" 
          font-size=\"24\" 
          fill=\"#d97706\" 
          text-anchor=\"middle\"
          letter-spacing=\"4\">CRAFTED FOR WILD</text>
    
    <!-- Tagline -->
    <text x=\"150\" y=\"400\" 
          font-family=\"'Open Sans', sans-serif\" 
          font-size=\"18\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          letter-spacing=\"2\">Premium Hunting</text>
    <text x=\"150\" y=\"430\" 
          font-family=\"'Open Sans', sans-serif\" 
          font-size=\"18\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          letter-spacing=\"2\">& Kitchen Knives</text>
    
    <!-- CTA -->
    <rect x=\"50\" y=\"480\" width=\"200\" height=\"55\" fill=\"#d97706\" rx=\"27\"/>
    <text x=\"150\" y=\"515\" 
          font-family=\"'Bebas Neue', sans-serif\" 
          font-size=\"24\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          letter-spacing=\"2\">VISIT STORE</text>
  </g>
  
  <!-- Decorative Mountain -->
  <path d=\"M 0,550 L 200,450 L 400,520 L 600,480 L 800,530 L 1000,500 L 1200,550 L 1200,628 L 0,628 Z\" 
        fill=\"#0f2919\" opacity=\"0.5\"/>
</svg>
