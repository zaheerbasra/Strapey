<svg width=\"800\" height=\"600\" viewBox=\"0 0 800 600\" xmlns=\"http://www.w3.org/2000/svg\">
  <defs>
    <linearGradient id=\"heroWebGradient\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">
      <stop offset=\"0%\" style=\"stop-color:#1a4d2e;stop-opacity:0.95\" />
      <stop offset=\"100%\" style=\"stop-color:#0f2919;stop-opacity:1\" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width=\"800\" height=\"600\" fill=\"url(#heroWebGradient)\"/>
  
  <!-- Dark Overlay -->
  <rect width=\"800\" height=\"600\" fill=\"rgba(0,0,0,0.2)\"/>
  
  <!-- Content Container -->
  <g transform=\"translate(400, 200)\">
    <!-- Logo Icon -->
    <circle cx=\"0\" cy=\"0\" r=\"60\" fill=\"#2c2c2c\" stroke=\"#d97706\" stroke-width=\"3\"/>
    <g>
      <path d=\"M -30,-5 L 35,7 L 35,12 L -30,0 Z\" fill=\"#6b7280\" stroke=\"#ffffff\" stroke-width=\"1.5\"/>
      <rect x=\"-42\" y=\"-5\" width=\"15\" height=\"13\" fill=\"#92400e\" stroke=\"#ffffff\" stroke-width=\"1\"/>
    </g>
    
    <!-- Brand Name -->
    <text x=\"0\" y=\"130\" 
          font-family=\"'Bebas Neue', 'Impact', sans-serif\" 
          font-size=\"64\" 
          font-weight=\"900\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          letter-spacing=\"8\">STRAPEY</text>
    
    <!-- Motto -->
    <text x=\"0\" y=\"175\" 
          font-family=\"'Open Sans', sans-serif\" 
          font-size=\"26\" 
          fill=\"#d97706\" 
          text-anchor=\"middle\"
          letter-spacing=\"4\">CRAFTED FOR WILD</text>
    
    <!-- Tagline -->
    <text x=\"0\" y=\"230\" 
          font-family=\"'Open Sans', sans-serif\" 
          font-size=\"20\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          opacity=\"0.9\">Premium Hunting & Kitchen Knives</text>
    <text x=\"0\" y=\"260\" 
          font-family=\"'Open Sans', sans-serif\" 
          font-size=\"18\" 
          fill=\"#c0c0c0\" 
          text-anchor=\"middle\"
          opacity=\"0.8\">Built for Serious Users</text>
    
    <!-- CTA Button -->
    <rect x=\"-120\" y=\"300\" width=\"240\" height=\"60\" fill=\"#d97706\" rx=\"30\"/>
    <text x=\"0\" y=\"340\" 
          font-family=\"'Bebas Neue', sans-serif\" 
          font-size=\"28\" 
          fill=\"#ffffff\" 
          text-anchor=\"middle\"
          letter-spacing=\"2\">EXPLORE COLLECTION</text>
  </g>
  
  <!-- Bottom Accent -->
  <path d=\"M 0,550 L 150,500 L 300,530 L 450,510 L 600,540 L 800,520 L 800,600 L 0,600 Z\" 
        fill=\"#0f2919\" opacity=\"0.7\"/>
</svg>
